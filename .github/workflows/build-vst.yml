name: Build SCSP FM Synth

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PLUGIN_NAME: scsp-fm-synth
  BUILD_DIR: tools/scsp_vst

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            libasound2-dev libcairo2-dev libdbus-1-dev libgl1-mesa-dev \
            liblo-dev libpulse-dev libx11-dev libxcursor-dev libxext-dev \
            libxrandr-dev libwebkit2gtk-4.1-dev

      - name: Build
        working-directory: ${{ env.BUILD_DIR }}
        run: make -j$(nproc)

      - name: Package
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          mkdir -p staging
          cp -r bin/${{ env.PLUGIN_NAME }}.clap staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.vst3 staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.lv2 staging/
          cd staging && tar czf ../scsp-fm-synth-linux-x86_64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: scsp-fm-synth-linux-x86_64
          path: ${{ env.BUILD_DIR }}/scsp-fm-synth-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build (Universal)
        working-directory: ${{ env.BUILD_DIR }}
        run: make -j$(sysctl -n hw.ncpu) DPF_WEBUI_MACOS_UNIVERSAL=true

      - name: Package
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          mkdir -p staging
          cp -r bin/${{ env.PLUGIN_NAME }}.clap staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.vst3 staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.lv2 staging/
          cd staging && zip -r ../scsp-fm-synth-macOS-universal.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: scsp-fm-synth-macOS-universal
          path: ${{ env.BUILD_DIR }}/scsp-fm-synth-macOS-universal.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            make
            unzip
            wget

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        working-directory: ${{ env.BUILD_DIR }}
        run: make -j$(nproc)

      - name: Package
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          mkdir -p staging
          cp -r bin/${{ env.PLUGIN_NAME }}.clap staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.vst3 staging/
          cp -r bin/${{ env.PLUGIN_NAME }}.lv2 staging/

      - uses: actions/upload-artifact@v4
        with:
          name: scsp-fm-synth-windows-x86_64
          path: ${{ env.BUILD_DIR }}/staging/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows build
        run: |
          cd artifacts/scsp-fm-synth-windows-x86_64
          zip -r ../../scsp-fm-synth-windows-x86_64.zip *
          cd ../..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/scsp-fm-synth-linux-x86_64/scsp-fm-synth-linux-x86_64.tar.gz
            artifacts/scsp-fm-synth-macOS-universal/scsp-fm-synth-macOS-universal.zip
            scsp-fm-synth-windows-x86_64.zip
